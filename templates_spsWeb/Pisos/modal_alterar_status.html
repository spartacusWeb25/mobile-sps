<div class="modal fade" id="modalAlterarStatus" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Alterar Status</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <label class="form-label">Novo status</label>

        <select id="novoStatusWorkflow" class="form-select">
          {% for status in status_opcoes %}
            <option value="{{ status.stat_codigo }}"
                    data-cor="{{ status.stat_cor }}"
                    {% if status.stat_codigo == status_codigo_atual %}selected{% endif %}>
              {{ status.stat_desc }}
            </option>
          {% endfor %}
        </select>

        <div class="mt-3">
          <span id="previewStatusWorkflow"
                class="badge px-3 py-2"
                style="background-color:#6c757d;">
            Prévia
          </span>
        </div>
      </div>

      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>

        <button type="button" class="btn btn-primary" onclick="salvarStatusWorkflow()">
          Salvar Status
        </button>
      </div>
    </div>
  </div>
</div>
