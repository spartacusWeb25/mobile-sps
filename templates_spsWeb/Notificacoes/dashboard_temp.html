{% extends 'base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{% static 'css/list.css' %}">

<style>
  .notif-wrapper {
    max-width: 1400px;
    margin: 0 auto;
  }

  .page-title {
    text-align: center;
    font-weight: 600;
    letter-spacing: .2px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    border-radius: 12px;
    border: 2px solid;
    transition: all .2s ease;
    overflow: hidden;
    position: relative;
    text-decoration: none;
    display: block;
    height: 100%;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    opacity: 0;
    transition: opacity .2s ease;
  }

  .stat-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
  }

  .stat-card:hover::before {
    opacity: 1;
  }

  .stat-card-danger {
    border-color: #ec8579;
    background: linear-gradient(135deg, rgba(231, 76, 60, 0.08), rgba(231, 76, 60, 0.02));
  }

  .stat-card-danger::before {
    background: #bb5348;
  }

  .stat-card-warning {
    border-color: #e9bb71;
    background: linear-gradient(135deg, rgba(243, 156, 18, 0.08), rgba(243, 156, 18, 0.02));
  }

  .stat-card-warning::before {
    background: #f0ad43;
  }

  .stat-card-success {
    border-color: #7fdba5;
    background: linear-gradient(135deg, rgba(39, 174, 96, 0.08), rgba(39, 174, 96, 0.02));
  }

  .stat-card-success::before {
    background: #62c089;
  }

  .stat-card-info {
    border-color: #3498db;
    background: linear-gradient(135deg, rgba(52, 152, 219, 0.08), rgba(52, 152, 219, 0.02));
  }

  .stat-card-info::before {
    background: #3498db;
  }

  .stat-card .card-body {
    padding: 1.25rem;
  }

  .stat-icon {
    font-size: 2rem;
    opacity: 0.2;
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
  }

  .stat-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: #666;
    margin-bottom: 0.5rem;
    display: block;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }

  .content-card {
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, .12);
    box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
  }

  .content-card .card-header {
    background: transparent;
    border-bottom: 1px solid rgba(255, 255, 255, .12);
    font-weight: 600;
    padding: 1rem 1.25rem;
  }

  .table-responsive {
    max-height: 400px;
    overflow-y: auto;
  }

  .table-responsive::-webkit-scrollbar {
    width: 8px;
  }

  .table-responsive::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, .05);
    border-radius: 4px;
  }

  .table-responsive::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, .2);
    border-radius: 4px;
  }

  .table-responsive::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, .3);
  }

  .quick-actions {
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, .12);
    overflow: hidden;
  }

  .quick-actions .list-group-item {
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, .08);
    padding: 1rem 1.25rem;
    transition: all .2s ease;
    background: transparent;
  }

  .quick-actions .list-group-item:hover {
    background: rgba(255, 255, 255, .05);
    padding-left: 1.5rem;
  }

  .quick-actions .list-group-item:last-child {
    border-bottom: none;
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    padding-left: 0.5rem;
    border-left: 4px solid var(--bs-primary);
  }

  .content-card .card-footer {
    background: transparent;
    border-top: 1px solid rgba(255, 255, 255, .12);
    padding: 0.75rem 1.25rem;
  }

  .badge-pulse {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {

    0%,
    100% {
      opacity: 1;
    }

    50% {
      opacity: 0.7;
    }
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 0.75rem;
  }

  @media (max-width: 1200px) {
    .stats-row {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  @media (max-width: 768px) {
    .stats-row {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>

<div class="container notif-wrapper py-3">
  <h3 class="page-title" style="font-size: 2.5rem;">
    <i class="bi bi-bell"></i> Central de Notificações
  </h3>
  <p class="text-muted text-center mb-4" style="font-size: 0.9rem;">
    Acompanhe suas contas, títulos e movimentações em tempo real
  </p>
