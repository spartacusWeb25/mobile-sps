<div class="modal-header">
    <h5 class="modal-title" id="modalClienteRapidoLabel">Cadastro rápido de cliente</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
    <div class="alert alert-danger d-none" id="cr_error" role="alert"></div>
    <div class="mb-3">
        <label class="form-label" for="cr_enti_nome">Nome *</label>
        <input type="text" class="form-control" id="cr_enti_nome" name="enti_nome" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="cr_enti_fone">Telefone</label>
        <input type="text" class="form-control" id="cr_enti_fone" name="enti_fone" placeholder="(00) 00000-0000">
    </div>
    <div class="mb-3">
        <label class="form-label" for="cr_enti_emai">E-mail</label>
        <input type="email" class="form-control" id="cr_enti_emai" name="enti_emai" placeholder="email@exemplo.com">
    </div>
    
    <hr>
    
    <div class="mb-3">
        <label class="form-label" for="cr_enti_cpf">CPF (opcional)</label>
        <input type="text" class="form-control" id="cr_enti_cpf" name="enti_cpf" maxlength="11">
    </div>
    <div class="mb-3">
        <label class="form-label" for="cr_enti_cep">CEP (opcional)</label>
        <input type="text" class="form-control" id="cr_enti_cep" name="enti_cep" maxlength="8">
        <div id="cr_cep_feedback" class="form-text text-muted"></div>
    </div>

    <!-- Campos hidden preenchidos automaticamente pelo CEP -->
    <input type="hidden" id="cr_enti_ende"     name="enti_ende">
    <input type="hidden" id="cr_enti_bair"     name="enti_bair">
    <input type="hidden" id="cr_enti_cida"     name="enti_cida">
    <input type="hidden" id="cr_enti_esta"     name="enti_esta">
    <input type="hidden" id="cr_enti_codi_cida" name="enti_codi_cida">
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary" id="btnSalvarClienteRapido">Salvar</button>
</div>

<script>
document.getElementById('cr_enti_cep').addEventListener('blur', function() {
    const cep = this.value.replace(/\D/g, '');
    const feedback = document.getElementById('cr_cep_feedback');
    
    if (cep.length !== 8) return;

    feedback.textContent = 'Buscando endereço...';
    feedback.className = 'form-text text-muted';

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(r => r.json())
        .then(data => {
            if (data.erro) {
                feedback.textContent = 'CEP não encontrado.';
                feedback.className = 'form-text text-danger';
                return;
            }
            document.getElementById('cr_enti_ende').value      = data.logradouro || '';
            document.getElementById('cr_enti_bair').value      = data.bairro     || '';
            document.getElementById('cr_enti_cida').value      = data.localidade || '';
            document.getElementById('cr_enti_esta').value      = data.uf         || '';
            document.getElementById('cr_enti_codi_cida').value = data.ibge       || '';

            feedback.textContent = `${data.localidade} - ${data.uf}`;
            feedback.className = 'form-text text-success';
        })
        .catch(() => {
            feedback.textContent = 'Erro ao buscar CEP.';
            feedback.className = 'form-text text-danger';
        });
});
</script>
