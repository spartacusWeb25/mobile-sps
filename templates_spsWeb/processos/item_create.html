{% extends 'processos/layouts/processos_base.html' %}
{% load static %}

{% block processos_content %}

<div class="card border-0 shadow-sm">

    <div class="card-body">

        <h3 class="mb-4">
            Novo Item de Processo Checklist
        </h3>

        <form method="post">
            {% csrf_token %}

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">
                        Modelo
                    </label>

                    <select name="checklist_modelo_id"
                            class="form-select">

                        {% for m in modelos %}
                        <option value="{{ m.id }}" {% if selected_modelo_id == m.id %}selected{% endif %}>
                            {{ m.chmo_nome }} (v{{ m.chmo_vers }})
                        </option>
                        {% endfor %}

                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">
                        Ordem
                    </label>

                    {{ form.ordem }}
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        Descrição
                    </label>

                    {{ form.descricao }}
                </div>

                <div class="col-12 form-check">
                    {{ form.obrigatorio }}

                    <label class="form-check-label">
                        {{ form.obrigatorio.label }}
                    </label>
                </div>

            </div>

            <div class="mt-4">
                <button class="btn btn-primary">
                    Salvar
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
