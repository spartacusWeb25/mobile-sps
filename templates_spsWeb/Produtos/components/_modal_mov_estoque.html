<div class="modal fade" id="modal-mov-estoque" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-mov-estoque-title">Movimentação de Estoque</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modal-mov-estoque-tipo" value="">
        <input type="hidden" id="modal-mov-estoque-produto" value="">

        <div class="row g-2">
          <div class="col-6">
            <label class="form-label">Data</label>
            <input type="date" class="form-control" id="modal-mov-estoque-data">
          </div>
          <div class="col-6">
            <label class="form-label">Entidade (cód.)</label>
            <input type="text" class="form-control" id="modal-mov-estoque-entidade" placeholder="Opcional">
          </div>
          <div class="col-4">
            <label class="form-label">Quantidade</label>
            <input type="number" step="0.01" class="form-control" id="modal-mov-estoque-qtd" placeholder="0,00">
          </div>
          <div class="col-4">
            <label class="form-label">Unitário</label>
            <input type="number" step="0.01" class="form-control" id="modal-mov-estoque-unit" placeholder="0,00">
          </div>
          <div class="col-4">
            <label class="form-label">Total</label>
            <input type="number" step="0.01" class="form-control" id="modal-mov-estoque-total" placeholder="0,00">
          </div>
          <div class="col-12">
            <label class="form-label">Observação</label>
            <input type="text" class="form-control" id="modal-mov-estoque-obs" placeholder="Opcional">
          </div>
        </div>

        <div class="text-danger small mt-2 d-none" id="modal-mov-estoque-erro"></div>
        <div class="text-success small mt-2 d-none" id="modal-mov-estoque-ok"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-outline-primary" id="modal-mov-estoque-salvar">Confirmar</button>
      </div>
    </div>
  </div>
</div>
