<script>
  document.addEventListener("DOMContentLoaded", () => {
    // =================================================================
    // 1. Tabela de Preços (Cálculo Automático)
    // =================================================================
    const container = document.querySelector("#precos-formset");
    if (container) {
      const toNumber = (v) => {
        if (!v) return 0;
        return parseFloat(v.replace(",", ".")) || 0;
      };

      const calcItem = (item) => {
        const prco = item.querySelector("[name$='tabe_prco']");
        const fret = item.querySelector("[name$='tabe_fret']");
        const desp = item.querySelector("[name$='tabe_desp']");
        const cuge = item.querySelector("[name$='tabe_cuge']");
        const marg = item.querySelector("[name$='tabe_marg']");
        const avis = item.querySelector("[name$='tabe_avis']");
        const apra = item.querySelector("[name$='tabe_apra']");
        const praz = item.querySelector("[name$='tabe_praz']");

        if (!prco || !fret || !cuge || !marg || !avis || !apra || !praz) return;

        const precoCompra = toNumber(prco.value);
        const percFrete = toNumber(fret.value);
        const percMargem = toNumber(marg.value);
        const percPrazo = toNumber(praz.value);

        const custoFrete = precoCompra * (percFrete / 100);
        const valorDespesas = desp ? toNumber(desp.value) : 0;
        const custoGerencial = precoCompra + custoFrete + valorDespesas;
        if (cuge) cuge.value = custoGerencial.toFixed(2);
        const precoVista = custoGerencial * (1 + percMargem / 100);
        const precoPrazo = precoVista * (1 + percPrazo / 100);
        avis.value = precoVista.toFixed(2);
        apra.value = precoPrazo.toFixed(2);
      };

      container.addEventListener("input", (e) => {
        const item = e.target.closest(".preco-item");
        if (item) calcItem(item);
      });

      container.querySelectorAll(".preco-item").forEach(calcItem);
    }

    const promoContainer = document.querySelector("#precos-promo-formset");
    if (promoContainer) {
      const toNumber = (v) => {
        if (!v) return 0;
        return parseFloat(v.replace(",", ".")) || 0;
      };

      const calcPromoItem = (item) => {
        const prco = item.querySelector("[name$='tabe_prco']");
        const desp = item.querySelector("[name$='tabe_desp']");
        const cuge = item.querySelector("[name$='tabe_cuge']");
        const marg = item.querySelector("[name$='tabe_marg']");
        const avis = item.querySelector("[name$='tabe_avis']");
        const apra = item.querySelector("[name$='tabe_apra']");
        const praz = item.querySelector("[name$='tabe_praz']");
        const cust = item.querySelector("[name$='tabe_cust']");

        if (!prco || !cuge || !marg || !avis || !apra || !praz) return;

        const precoBase = toNumber(prco.value);
        const valorDespesas = desp ? toNumber(desp.value) : 0;
        const percMargem = toNumber(marg.value);
        const percPrazo = toNumber(praz.value);

        const custoGerencial = precoBase + valorDespesas;
        if (cuge) cuge.value = custoGerencial.toFixed(2);
        if (cust) cust.value = custoGerencial.toFixed(2);

        const precoVista = precoBase * (1 + percMargem / 100);
        const precoPrazo = precoVista * (1 + percPrazo / 100);
        avis.value = precoVista.toFixed(2);
        apra.value = precoPrazo.toFixed(2);
      };

      promoContainer.addEventListener("input", (e) => {
        const item = e.target.closest(".preco-promo-item");
        if (item) calcPromoItem(item);
      });

      promoContainer.querySelectorAll(".preco-promo-item").forEach(calcPromoItem);
    }

    // =================================================================
    // 2. Autocomplete Helpers
    // =================================================================
    function createDropdown(container) {
      let dd = container.querySelector('.autocomplete-dropdown');
      if (!dd) {
        dd = document.createElement('div');
        dd.className = 'autocomplete-dropdown list-group position-absolute w-100';
        dd.style.zIndex = '1000';
        container.appendChild(dd);
      }
      return dd;
    }

    async function fetchResults(url, term) {
      const separator = url.includes('?') ? '&' : '?';
      const resp = await fetch(`${url}${separator}term=${encodeURIComponent(term)}`);
      const json = await resp.json();
      const results = Array.isArray(json) ? json : (json.results || []);
      return results.map(r => ({ value: r.value ?? r.id, label: r.label ?? r.text }));
    }

    function ensureOption(selectEl, value, label) {
      if (!selectEl || !value) return;
      const found = Array.from(selectEl.options).find(o => String(o.value) === String(value));
      if (!found) {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = label || value;
        selectEl.appendChild(opt);
      }
    }

    window.setupTextAutocomplete = function ({ inputEl, url, onPick }) {
      if (!inputEl) return;
      const container = inputEl.parentElement;
      const dropdown = createDropdown(container);
      let debounce;

      // Spinner element (optional if exists in HTML)
      const loadingEl = container.querySelector('.spinner-border');

      inputEl.addEventListener('input', e => {
        const term = e.target.value.trim();
        clearTimeout(debounce);
        dropdown.innerHTML = '';
        if (term.length < 2) return;

        if (loadingEl) loadingEl.style.display = 'block';

        debounce = setTimeout(async () => {
          try {
            const items = await fetchResults(url, term);
            dropdown.innerHTML = '';
            items.forEach(item => {
              const a = document.createElement('a');
              a.href = '#';
              a.className = 'list-group-item list-group-item-action';
              a.textContent = item.label;
              a.addEventListener('click', ev => {
                ev.preventDefault();
                inputEl.value = item.value;
                dropdown.innerHTML = '';
                if (typeof onPick === 'function') onPick(item);
              });
              dropdown.appendChild(a);
            });

            if (items.length === 0) {
              const div = document.createElement('div');
              div.className = 'list-group-item text-muted';
              div.textContent = 'Nenhum resultado encontrado';
              dropdown.appendChild(div);
            }
          } catch (e) {
            dropdown.innerHTML = '';
          } finally {
            if (loadingEl) loadingEl.style.display = 'none';
          }
        }, 250);
      });
      document.addEventListener('click', e => { if (!container.contains(e.target)) dropdown.innerHTML = ''; });
    };

    window.setupSelectAutocomplete = function ({ inputEl, selectEl, url }) {
      if (!inputEl || !selectEl) return;
      const container = inputEl.parentElement;
      const dropdown = createDropdown(container);
      let debounce;
      const loadingEl = container.querySelector('.spinner-border');

      // Hide original select
      selectEl.style.display = 'none';
      if (selectEl.value) {
        const opt = Array.from(selectEl.options).find(o => String(o.value) === String(selectEl.value));
        if (opt && opt.textContent && inputEl.value && String(inputEl.value).trim() === String(selectEl.value).trim()) {
          inputEl.value = opt.textContent;
        } else if (opt && opt.textContent && !inputEl.value) {
          inputEl.value = opt.textContent;
        }
      }

      inputEl.addEventListener('input', e => {
        const term = e.target.value.trim();
        clearTimeout(debounce);
        dropdown.innerHTML = '';
        if (term.length < 2) return;

        if (loadingEl) loadingEl.style.display = 'block';

        debounce = setTimeout(async () => {
          try {
            const items = await fetchResults(url, term);
            dropdown.innerHTML = '';
            items.forEach(item => {
              const a = document.createElement('a');
              a.href = '#';
              a.className = 'list-group-item list-group-item-action';
              a.textContent = item.label;
              a.addEventListener('click', ev => {
                ev.preventDefault();
                ensureOption(selectEl, item.value, item.label);
                selectEl.value = item.value;
                inputEl.value = item.label;
                dropdown.innerHTML = '';
              });
              dropdown.appendChild(a);
            });
            if (items.length === 0) {
              const div = document.createElement('div');
              div.className = 'list-group-item text-muted';
              div.textContent = 'Nenhum resultado encontrado';
              dropdown.appendChild(div);
            }
          } catch (e) {
            dropdown.innerHTML = '';
          } finally {
            if (loadingEl) loadingEl.style.display = 'none';
          }
        }, 250);
      });
      document.addEventListener('click', e => { if (!container.contains(e.target)) dropdown.innerHTML = ''; });
    };

    // =================================================================
    // 3. NCM Helper Logic
    // =================================================================
    window.fetchNcmDefaults = async function (ncmCode) {
      const displayCode = document.getElementById('ncm-display-code');
      const defaultsList = document.getElementById('ncm-defaults-list');
      const preview = document.getElementById('ncm-defaults-preview');

      if (displayCode) displayCode.textContent = ncmCode;

      if (!ncmCode) {
        if (preview) preview.style.display = 'none';
        return;
      }

      try {
        const response = await fetch(`{% url 'ncmfiscalpadrao_list' slug=slug %}?ncm=${encodeURIComponent(ncmCode)}`);
        const data = await response.json();

        if (data.aliquotas && defaultsList && preview) {
          const parts = [];
          if (data.aliquotas.ipi) parts.push(`IPI: ${data.aliquotas.ipi}%`);
          if (data.aliquotas.pis) parts.push(`PIS: ${data.aliquotas.pis}%`);
          if (data.aliquotas.cofins) parts.push(`COFINS: ${data.aliquotas.cofins}%`);
          if (data.aliquotas.ibs) parts.push(`IBS: ${data.aliquotas.ibs}%`);
          if (data.aliquotas.cbs) parts.push(`CBS: ${data.aliquotas.cbs}%`);

          defaultsList.textContent = parts.length ? parts.join(' | ') : 'Sem alíquotas específicas cadastradas';
          preview.style.display = 'block';
        }
      } catch (e) {
        console.error("Erro ao buscar defaults NCM:", e);
      }
    };

    // =================================================================
    // 4. Inicialização dos Autocompletes e Modals
    // =================================================================
    const urls = {
      unidades: "{% url 'autocomplete_unidades' slug=slug %}",
      grupos: "{% url 'autocomplete_grupos' slug=slug %}",
      subgrupos: "{% url 'autocomplete_subgrupos' slug=slug %}",
      familias: "{% url 'autocomplete_familias' slug=slug %}",
      marcas: "{% url 'autocomplete_marcas' slug=slug %}",
      ncms: "{% url 'autocomplete_ncms' slug=slug %}",
      createGrupo: "{% url 'ajax_create_grupo' slug=slug %}",
      createSubgrupo: "{% url 'ajax_create_subgrupo' slug=slug %}",
      createFamilia: "{% url 'ajax_create_familia' slug=slug %}",
      createMarca: "{% url 'ajax_create_marca' slug=slug %}",
      movEstoque: "{% url 'ajax_movimentar_estoque' slug=slug %}",
    };

    setupTextAutocomplete({ inputEl: document.getElementById('id_prod_unme'), url: urls.unidades });

    setupTextAutocomplete({
      inputEl: document.getElementById('autocomplete-ncm') || document.getElementById('id_prod_ncm'),
      url: urls.ncms,
      onPick: (item) => fetchNcmDefaults(item.value)
    });

    setupSelectAutocomplete({ inputEl: document.getElementById('autocomplete-grupo'), selectEl: document.getElementById('id_prod_grup'), url: urls.grupos });
    setupSelectAutocomplete({ inputEl: document.getElementById('autocomplete-subgrupo'), selectEl: document.getElementById('id_prod_sugr'), url: urls.subgrupos });
    setupSelectAutocomplete({ inputEl: document.getElementById('autocomplete-familia'), selectEl: document.getElementById('id_prod_fami'), url: urls.familias });
    setupSelectAutocomplete({ inputEl: document.getElementById('autocomplete-marca'), selectEl: document.getElementById('id_prod_marc'), url: urls.marcas });

    function setModalError(el, message) {
      if (!el) return;
      if (!message) {
        el.textContent = '';
        el.classList.add('d-none');
        return;
      }
      el.textContent = message;
      el.classList.remove('d-none');
    }

    async function postJson(url, payload) {
      const csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value || (document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '');
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
        credentials: 'same-origin',
        body: JSON.stringify(payload || {}),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.detail || 'Falha ao salvar.');
      return data;
    }

    function openCadastroModal(entity) {
      if (!window.bootstrap) return;
      const map = {
        grupo: { modalId: 'modal-grupo', inputId: 'autocomplete-grupo', selectId: 'id_prod_grup', url: urls.createGrupo },
        subgrupo: { modalId: 'modal-subgrupo', inputId: 'autocomplete-subgrupo', selectId: 'id_prod_sugr', url: urls.createSubgrupo },
        familia: { modalId: 'modal-familia', inputId: 'autocomplete-familia', selectId: 'id_prod_fami', url: urls.createFamilia },
        marca: { modalId: 'modal-marca', inputId: 'autocomplete-marca', selectId: 'id_prod_marc', url: urls.createMarca },
      };
      const cfg = map[entity];
      if (!cfg) return;
      const modalEl = document.getElementById(cfg.modalId);
      if (!modalEl) return;

      const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
      const typed = (document.getElementById(cfg.inputId)?.value || '').trim();

      if (entity === 'marca') {
        const nomeEl = document.getElementById('modal-marca-nome');
        const errEl = document.getElementById('modal-marca-erro');
        if (nomeEl && typed && !nomeEl.value) nomeEl.value = typed;
        setModalError(errEl, '');
      } else {
        const descId = `modal-${entity}-descricao`;
        const codeId = `modal-${entity}-codigo`;
        const errId = `modal-${entity}-erro`;
        const descEl = document.getElementById(descId);
        const codeEl = document.getElementById(codeId);
        const errEl = document.getElementById(errId);
        if (descEl && typed && !descEl.value) descEl.value = typed;
        if (codeEl) codeEl.value = '';
        setModalError(errEl, '');
      }

      modal.show();
    }

    document.querySelectorAll('.js-open-prod-cadastro').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        openCadastroModal(btn.dataset.entity);
      });
    });

    async function salvarCadastro(entity) {
      const map = {
        grupo: { modalId: 'modal-grupo', inputId: 'autocomplete-grupo', selectId: 'id_prod_grup', url: urls.createGrupo },
        subgrupo: { modalId: 'modal-subgrupo', inputId: 'autocomplete-subgrupo', selectId: 'id_prod_sugr', url: urls.createSubgrupo },
        familia: { modalId: 'modal-familia', inputId: 'autocomplete-familia', selectId: 'id_prod_fami', url: urls.createFamilia },
        marca: { modalId: 'modal-marca', inputId: 'autocomplete-marca', selectId: 'id_prod_marc', url: urls.createMarca },
      };
      const cfg = map[entity];
      if (!cfg) return;
      const selectEl = document.getElementById(cfg.selectId);
      const inputEl = document.getElementById(cfg.inputId);
      const modalEl = document.getElementById(cfg.modalId);
      if (!modalEl || !selectEl || !inputEl) return;

      let payload = {};
      let errEl = null;

      if (entity === 'marca') {
        const nomeEl = document.getElementById('modal-marca-nome');
        errEl = document.getElementById('modal-marca-erro');
        payload = { nome: (nomeEl?.value || '').trim() };
        if (!payload.nome) { setModalError(errEl, 'Nome é obrigatório.'); return; }
      } else {
        const codeEl = document.getElementById(`modal-${entity}-codigo`);
        const descEl = document.getElementById(`modal-${entity}-descricao`);
        errEl = document.getElementById(`modal-${entity}-erro`);
        payload = { codigo: (codeEl?.value || '').trim(), descricao: (descEl?.value || '').trim() };
        if (!payload.descricao) { setModalError(errEl, 'Descrição é obrigatória.'); return; }
      }

      try {
        setModalError(errEl, '');
        const created = await postJson(cfg.url, payload);
        ensureOption(selectEl, created.value, created.label);
        selectEl.value = created.value;
        inputEl.value = created.label;
        bootstrap.Modal.getOrCreateInstance(modalEl).hide();
      } catch (err) {
        setModalError(errEl, err.message || 'Erro ao salvar.');
      }
    }

    document.getElementById('modal-grupo-salvar')?.addEventListener('click', () => salvarCadastro('grupo'));
    document.getElementById('modal-subgrupo-salvar')?.addEventListener('click', () => salvarCadastro('subgrupo'));
    document.getElementById('modal-familia-salvar')?.addEventListener('click', () => salvarCadastro('familia'));
    document.getElementById('modal-marca-salvar')?.addEventListener('click', () => salvarCadastro('marca'));

    function openMovEstoque(tipo, produto) {
      if (!window.bootstrap) return;
      const modalEl = document.getElementById('modal-mov-estoque');
      if (!modalEl) return;
      const titleEl = document.getElementById('modal-mov-estoque-title');
      const tipoEl = document.getElementById('modal-mov-estoque-tipo');
      const prodEl = document.getElementById('modal-mov-estoque-produto');
      const dataEl = document.getElementById('modal-mov-estoque-data');
      const entidadeEl = document.getElementById('modal-mov-estoque-entidade');
      const qtdEl = document.getElementById('modal-mov-estoque-qtd');
      const unitEl = document.getElementById('modal-mov-estoque-unit');
      const totalEl = document.getElementById('modal-mov-estoque-total');
      const obsEl = document.getElementById('modal-mov-estoque-obs');
      const errEl = document.getElementById('modal-mov-estoque-erro');
      const okEl = document.getElementById('modal-mov-estoque-ok');

      if (titleEl) titleEl.textContent = (tipo === 'SAIDA' ? 'Saída rápida de estoque' : 'Entrada rápida de estoque');
      if (tipoEl) tipoEl.value = tipo || '';
      if (prodEl) prodEl.value = produto || '';
      if (dataEl) dataEl.valueAsDate = new Date();
      if (entidadeEl) entidadeEl.value = '';
      if (qtdEl) qtdEl.value = '';
      if (unitEl) unitEl.value = '';
      if (totalEl) totalEl.value = '';
      if (obsEl) obsEl.value = '';
      setModalError(errEl, '');
      setModalError(okEl, '');

      bootstrap.Modal.getOrCreateInstance(modalEl).show();
    }

    document.querySelectorAll('.js-mov-estoque').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        openMovEstoque(btn.dataset.tipo, btn.dataset.produto);
      });
    });

    function recalcTotalMov() {
      const qtdEl = document.getElementById('modal-mov-estoque-qtd');
      const unitEl = document.getElementById('modal-mov-estoque-unit');
      const totalEl = document.getElementById('modal-mov-estoque-total');
      if (!qtdEl || !unitEl || !totalEl) return;
      const qtd = parseFloat(String(qtdEl.value || '').replace(',', '.')) || 0;
      const unit = parseFloat(String(unitEl.value || '').replace(',', '.')) || 0;
      if (qtd > 0 && unit > 0 && (!totalEl.value || parseFloat(totalEl.value) === 0)) {
        totalEl.value = (qtd * unit).toFixed(2);
      }
    }

    document.getElementById('modal-mov-estoque-qtd')?.addEventListener('input', recalcTotalMov);
    document.getElementById('modal-mov-estoque-unit')?.addEventListener('input', recalcTotalMov);

    document.getElementById('modal-mov-estoque-salvar')?.addEventListener('click', async () => {
      const tipo = (document.getElementById('modal-mov-estoque-tipo')?.value || '').trim().toUpperCase();
      const produto = (document.getElementById('modal-mov-estoque-produto')?.value || '').trim();
      const data = document.getElementById('modal-mov-estoque-data')?.value || '';
      const entidade = (document.getElementById('modal-mov-estoque-entidade')?.value || '').trim();
      const qtd = document.getElementById('modal-mov-estoque-qtd')?.value || '';
      const total = document.getElementById('modal-mov-estoque-total')?.value || '';
      const obs = (document.getElementById('modal-mov-estoque-obs')?.value || '').trim();
      const errEl = document.getElementById('modal-mov-estoque-erro');
      const okEl = document.getElementById('modal-mov-estoque-ok');

      setModalError(errEl, '');
      setModalError(okEl, '');

      if (!produto) { setModalError(errEl, 'Produto não informado.'); return; }
      if (!tipo || (tipo !== 'ENTRADA' && tipo !== 'SAIDA')) { setModalError(errEl, 'Tipo inválido.'); return; }
      if (!qtd || parseFloat(String(qtd).replace(',', '.')) <= 0) { setModalError(errEl, 'Quantidade deve ser maior que zero.'); return; }

      try {
        const resp = await postJson(urls.movEstoque, {
          tipo: tipo,
          produto: produto,
          data: data,
          entidade: entidade,
          quantidade: qtd,
          total: total,
          observacao: obs,
        });
        const saldo = resp?.resultado?.saldo;
        const msg = saldo === null || saldo === undefined ? 'Movimentação registrada.' : `Movimentação registrada. Saldo: ${saldo}`;
        if (okEl) {
          okEl.textContent = msg;
          okEl.classList.remove('d-none');
        }
        setTimeout(() => {
          const modalEl = document.getElementById('modal-mov-estoque');
          if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).hide();
        }, 600);
      } catch (err) {
        setModalError(errEl, err.message || 'Erro ao registrar.');
      }
    });

    // Inicializar defaults se já houver valor (Edição ou Reload)
    const existingNcm = document.getElementById('autocomplete-ncm') || document.getElementById('id_prod_ncm');
    if (existingNcm && existingNcm.value) {
      fetchNcmDefaults(existingNcm.value);
    }

    // Validação Visual de NCM (8 dígitos)
    const ncmInput = document.getElementById('id_prod_ncm');
    if (ncmInput) {
      ncmInput.addEventListener('blur', function () {
        const val = this.value.replace(/\D/g, '');
        const existingWarning = this.parentElement.querySelector('.ncm-warning');
        if (existingWarning) existingWarning.remove();

        if (val.length > 0 && val.length !== 8) {
          const warning = document.createElement('div');
          warning.className = 'text-danger small mt-1 ncm-warning';
          warning.innerHTML = '<i class="bi bi-exclamation-triangle"></i> NCM deve ter 8 dígitos numéricos.';
          this.parentElement.appendChild(warning);
        }
      });
    }

    // =================================================================
    // 5. Tributos Spartacus
    // =================================================================
    const spartacusApp = document.getElementById('tributos-spartacus-app');
    if (spartacusApp) {
      const apiUrl = spartacusApp.dataset.apiUrl;
      const cfopUrl = spartacusApp.dataset.cfopUrl;
      const tipoDefault = spartacusApp.dataset.tipo || 'P';
      const statusEl = document.getElementById('tributos-spartacus-status');
      const listEl = document.getElementById('tributos-spartacus-lista');
      const codigoInput = document.getElementById('id_prod_codi');
      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value;

      const fields = {
        tipo: document.getElementById('spartacus-tipo'),
        estado: document.getElementById('spartacus-estado'),
        entidade: document.getElementById('spartacus-entidade'),
        cfop: document.getElementById('spartacus-cfop'),
        cfopDisplay: document.getElementById('spartacus-cfop-display'),
        cstIcms: document.getElementById('spartacus-cst-icms'),
        aliqIcms: document.getElementById('spartacus-aliq-icms'),
        reducaoIcms: document.getElementById('spartacus-reducao-icms'),
        cstPis: document.getElementById('spartacus-cst-pis'),
        aliqPis: document.getElementById('spartacus-aliq-pis'),
        cstCofins: document.getElementById('spartacus-cst-cofins'),
        aliqCofins: document.getElementById('spartacus-aliq-cofins'),
        aliqIcmsSt: document.getElementById('spartacus-aliq-icms-st'),
        reducaoIcmsSt: document.getElementById('spartacus-reducao-icms-st'),
        mvaSt: document.getElementById('spartacus-mva-st'),
      };

      const cloneFields = {
        origemEstado: document.getElementById('spartacus-clone-origem-estado'),
        origemEntidade: document.getElementById('spartacus-clone-origem-entidade'),
        codigoDestino: document.getElementById('spartacus-clone-codigo-destino'),
        estadosDestino: document.getElementById('spartacus-clone-estados'),
        entidadesDestino: document.getElementById('spartacus-clone-entidades'),
      };

      const readCodigo = () => {
        if (codigoInput && codigoInput.value.trim()) return codigoInput.value.trim();
        return (spartacusApp.dataset.codigo || '').trim();
      };

      const setStatus = (message, type = 'secondary') => {
        if (!statusEl) return;
        statusEl.className = `alert alert-${type}${type === 'secondary' ? ' small' : ''}`;
        statusEl.textContent = message;
      };

      const asText = (value) => value === null || value === undefined ? '' : String(value);
      const asNumber = (value) => value === null || value === undefined || value === '' ? '' : String(value);
      const readMulti = (selectEl) => Array.from(selectEl?.selectedOptions || []).map(option => option.value);

      const clearSpartacusForm = () => {
        fields.tipo.value = tipoDefault;
        fields.estado.value = '';
        fields.entidade.value = '';
        fields.cfop.value = '';
        if (fields.cfopDisplay) fields.cfopDisplay.value = '';
        fields.cstIcms.value = '';
        fields.aliqIcms.value = '';
        fields.reducaoIcms.value = '';
        fields.cstPis.value = '';
        fields.aliqPis.value = '';
        fields.cstCofins.value = '';
        fields.aliqCofins.value = '';
        fields.aliqIcmsSt.value = '';
        fields.reducaoIcmsSt.value = '';
        fields.mvaSt.value = '';
      };

      const fillSpartacusForm = (row) => {
        fields.tipo.value = asText(row.tipo || tipoDefault);
        fields.estado.value = asText(row.estado);
        fields.entidade.value = asText(row.entidade);
        fields.cfop.value = asNumber(row.cfop);
        if (fields.cfopDisplay) fields.cfopDisplay.value = row.cfop_label || row.cfop || '';
        fields.cstIcms.value = asText(row.cst_icms);
        fields.aliqIcms.value = asNumber(row.aliquota_icms);
        fields.reducaoIcms.value = asNumber(row.reducao_icms);
        fields.cstPis.value = asText(row.cst_pis);
        fields.aliqPis.value = asNumber(row.aliquota_pis);
        fields.cstCofins.value = asText(row.cst_cofins);
        fields.aliqCofins.value = asNumber(row.aliquota_cofins);
        fields.aliqIcmsSt.value = asNumber(row.aliquota_icms_st);
        fields.reducaoIcmsSt.value = asNumber(row.reducao_icms_st);
        fields.mvaSt.value = asNumber(row.mva_icms_st);
      };

      const buildPayload = () => ({
        codigo: readCodigo(),
        tipo: (fields.tipo.value || tipoDefault).trim().toUpperCase(),
        estado: fields.estado.value,
        entidade: fields.entidade.value,
        cfop: fields.cfop.value || null,
        cst_icms: fields.cstIcms.value || null,
        aliquota_icms: fields.aliqIcms.value || null,
        reducao_icms: fields.reducaoIcms.value || null,
        cst_pis: fields.cstPis.value || null,
        aliquota_pis: fields.aliqPis.value || null,
        cst_cofins: fields.cstCofins.value || null,
        aliquota_cofins: fields.aliqCofins.value || null,
        aliquota_icms_st: fields.aliqIcmsSt.value || null,
        reducao_icms_st: fields.reducaoIcmsSt.value || null,
        mva_icms_st: fields.mvaSt.value || null,
      });

      const renderRows = (rows) => {
        if (!listEl) return;
        if (!rows.length) {
          listEl.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Nenhuma tributação gravada para este produto.</td></tr>';
          return;
        }

        listEl.innerHTML = '';
        rows.forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.estado_label || row.estado || ''}</td>
            <td>${row.entidade || ''} - ${row.entidade_label || ''}</td>
            <td>${row.cst_icms || '-'} / ${row.aliquota_icms || '0'}</td>
            <td>${row.cst_pis || '-'} / ${row.aliquota_pis || '0'}</td>
            <td>${row.cst_cofins || '-'} / ${row.aliquota_cofins || '0'}</td>
            <td>${row.aliquota_icms_st || '0'} | MVA ${row.mva_icms_st || '0'}</td>
            <td><small>${row.cfop_label || row.cfop || '-'}</small></td>
            <td class="text-end">
              <button type="button" class="btn btn-sm btn-outline-primary me-1" data-action="edit">Editar</button>
              <button type="button" class="btn btn-sm btn-outline-danger" data-action="delete">Excluir</button>
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener('click', () => {
            fillSpartacusForm(row);
            cloneFields.origemEstado.value = row.estado || '';
            cloneFields.origemEntidade.value = row.entidade || '';
            setStatus(`Tributação ${row.estado}/${row.entidade} carregada para edição.`, 'info');
          });

          tr.querySelector('[data-action="delete"]')?.addEventListener('click', async () => {
            if (!confirm(`Excluir a tributação ${row.estado}/${row.entidade}?`)) return;
            try {
              const resp = await fetch(apiUrl, {
                method: 'DELETE',
                headers: {
                  'Content-Type': 'application/json',
                  'X-CSRFToken': csrfToken,
                },
                body: JSON.stringify({
                  codigo: readCodigo(),
                  tipo: row.tipo || tipoDefault,
                  estado: row.estado,
                  entidade: row.entidade,
                }),
              });
              const data = await resp.json();
              if (!resp.ok) throw new Error(data.detail || 'Falha ao excluir tributação.');
              setStatus('Tributação excluída com sucesso.', 'success');
              await loadSpartacusRows();
            } catch (error) {
              setStatus(error.message, 'danger');
            }
          });

          listEl.appendChild(tr);
        });
      };

      async function loadSpartacusRows() {
        const codigo = readCodigo();
        if (!codigo) {
          renderRows([]);
          setStatus('Salve o produto ou informe um código para gerenciar os Tributos Spartacus.', 'secondary');
          return;
        }

        try {
          const resp = await fetch(`${apiUrl}?codigo=${encodeURIComponent(codigo)}&tipo=${encodeURIComponent((fields.tipo.value || tipoDefault).trim().toUpperCase())}`);
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || 'Falha ao carregar tributações Spartacus.');
          renderRows(Array.isArray(data) ? data : []);
          setStatus(`Tributações Spartacus carregadas para o produto ${codigo}.`, 'success');
        } catch (error) {
          renderRows([]);
          setStatus(error.message, 'danger');
        }
      }

      if (window.setupTextAutocomplete && cfopUrl) {
        window.setupTextAutocomplete({
          inputEl: fields.cfopDisplay,
          url: cfopUrl,
          onPick: (item) => {
            fields.cfopDisplay.value = item.label;
            fields.cfop.value = item.value;
          }
        });

        // Handle manual clear
        fields.cfopDisplay.addEventListener('input', (e) => {
          if (!e.target.value.trim()) {
            fields.cfop.value = '';
          }
        });
      }

      document.getElementById('tributos-spartacus-recarregar')?.addEventListener('click', loadSpartacusRows);

      document.getElementById('tributos-spartacus-salvar')?.addEventListener('click', async () => {
        const payload = buildPayload();
        if (!payload.codigo) {
          setStatus('Informe o código do produto antes de salvar a tributação Spartacus.', 'warning');
          return;
        }
        if (!payload.estado || !payload.entidade) {
          setStatus('Selecione estado e tipo de entidade para salvar.', 'warning');
          return;
        }

        try {
          const resp = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || 'Falha ao salvar tributação Spartacus.');
          setStatus(`Tributação ${payload.estado}/${payload.entidade} salva com sucesso.`, 'success');
          fillSpartacusForm(data);
          await loadSpartacusRows();
        } catch (error) {
          setStatus(error.message, 'danger');
        }
      });

      document.getElementById('tributos-spartacus-clonar')?.addEventListener('click', async () => {
        const codigo = readCodigo();
        if (!codigo) {
          setStatus('Informe o código do produto antes de clonar.', 'warning');
          return;
        }

        const payload = {
          codigo,
          codigo_destino: cloneFields.codigoDestino.value || null,
          tipo: (fields.tipo.value || tipoDefault).trim().toUpperCase(),
          origem_estado: cloneFields.origemEstado.value,
          origem_entidade: cloneFields.origemEntidade.value,
          estados_destino: readMulti(cloneFields.estadosDestino),
          entidades_destino: readMulti(cloneFields.entidadesDestino),
        };

        if (!payload.origem_estado || !payload.origem_entidade) {
          setStatus('Selecione o estado e a entidade de origem para clonar.', 'warning');
          return;
        }

        try {
          const resp = await fetch(`${apiUrl}clone/`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || 'Falha ao clonar tributações Spartacus.');
          setStatus(`${Array.isArray(data) ? data.length : 0} tributação(ões) clonada(s) com sucesso.`, 'success');
          await loadSpartacusRows();
        } catch (error) {
          setStatus(error.message, 'danger');
        }
      });

      codigoInput?.addEventListener('blur', () => {
        spartacusApp.dataset.codigo = readCodigo();
        loadSpartacusRows();
      });

      clearSpartacusForm();
      spartacusApp.dataset.codigo = readCodigo();
      loadSpartacusRows();
    }

    // =================================================================
    // 6. Simulação de Impostos
    // =================================================================
    const btnSimular = document.getElementById('btn-simular-impostos');
    if (btnSimular) {
      btnSimular.addEventListener('click', async () => {
        const errContainer = document.getElementById('simulacao-error'); // Check if exists
        const resContainer = document.getElementById('simulacao-resultado');

        if (errContainer) errContainer.style.display = 'none';
        if (resContainer) resContainer.style.display = 'none';

        const showError = (msg) => {
          if (errContainer) {
            errContainer.textContent = msg;
            errContainer.style.display = 'block';
          } else {
            alert(msg);
          }
        };

        const preco = document.getElementById('simulacao-preco').value;
        const ncmEl = document.querySelector('[name="prod_ncm"]');
        const ncm = ncmEl ? ncmEl.value : '';

        if (!ncm) {
          showError('Por favor, informe o NCM do produto para simular.');
          return;
        }

        // Coletar overrides fiscais
        const payload = {
          preco: preco,
          ncm: ncm,
          tipo_oper: document.getElementById('sim-tipo-oper')?.value || 'VENDA',
          uf_origem: document.getElementById('sim-uf-origem')?.value || 'SP',
          uf_destino: document.getElementById('sim-uf-destino')?.value || 'SP',
          cst_icms: document.querySelector('[name="fiscal-cst_icms"]')?.value,
          aliq_icms: document.querySelector('[name="fiscal-aliq_icms"]')?.value,
          cst_ipi: document.querySelector('[name="fiscal-cst_ipi"]')?.value,
          aliq_ipi: document.querySelector('[name="fiscal-aliq_ipi"]')?.value,
          cst_pis: document.querySelector('[name="fiscal-cst_pis"]')?.value,
          aliq_pis: document.querySelector('[name="fiscal-aliq_pis"]')?.value,
          cst_cofins: document.querySelector('[name="fiscal-cst_cofins"]')?.value,
          aliq_cofins: document.querySelector('[name="fiscal-aliq_cofins"]')?.value,
          cst_cbs: document.querySelector('[name="fiscal-cst_cbs"]')?.value,
          aliq_cbs: document.querySelector('[name="fiscal-aliq_cbs"]')?.value,
          cst_ibs: document.querySelector('[name="fiscal-cst_ibs"]')?.value,
          aliq_ibs: document.querySelector('[name="fiscal-aliq_ibs"]')?.value,
        };

        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        try {
          btnSimular.disabled = true;
          btnSimular.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Calculando...';

          const resp = await fetch('{% url "simular_impostos_web" slug=slug %}', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(payload)
          });

          if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.error || 'Erro na simulação');
          }

          const data = await resp.json();

          // Atualizar UI
          const fmt = (v) => {
            if (v === null || v === undefined) return 'R$ 0,00';
            return parseFloat(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
          };

          document.getElementById('res-icms').textContent = fmt(data.valores.icms);
          document.getElementById('res-ipi').textContent = fmt(data.valores.ipi);
          document.getElementById('res-pis').textContent = fmt(data.valores.pis);
          document.getElementById('res-cofins').textContent = fmt(data.valores.cofins);
          document.getElementById('res-ibs').textContent = fmt(data.valores.ibs);
          document.getElementById('res-cbs').textContent = fmt(data.valores.cbs);

          let total = (parseFloat(data.valores.icms || 0) + parseFloat(data.valores.ipi || 0) +
            parseFloat(data.valores.pis || 0) + parseFloat(data.valores.cofins || 0) +
            parseFloat(data.valores.ibs || 0) + parseFloat(data.valores.cbs || 0));

          document.getElementById('res-total-tributos').textContent = fmt(total);

          if (resContainer) resContainer.style.display = 'block';

        } catch (e) {
          showError('Erro ao calcular impostos: ' + e.message);
        } finally {
          btnSimular.disabled = false;
          btnSimular.innerHTML = '<i class="bi bi-play-fill"></i> Calcular Impostos';
        }
      });
    }

    const tabsEl = document.getElementById('produtoTabs');
    if (tabsEl) {
      const links = tabsEl.querySelectorAll('[data-bs-toggle="tab"]');

      links.forEach((link) => {
        const targetSel = link.getAttribute('href') || link.getAttribute('data-bs-target');
        if (!targetSel) return;
        const pane = document.querySelector(targetSel);
        if (!pane) return;

        const hasErrors = pane.querySelector('.alert-danger, .text-danger, .invalid-feedback, .is-invalid');
        const existingBadge = link.querySelector('.tab-error-badge');
        if (existingBadge) existingBadge.remove();

        if (hasErrors) {
          link.classList.add('text-danger', 'fw-semibold');
          const badge = document.createElement('span');
          badge.className = 'badge bg-danger ms-2 tab-error-badge';
          badge.textContent = '!';
          link.appendChild(badge);
        }
      });
    }
  });
</script>
